name: ci

# casey composes three projects: freddie and thatcher resolve from npm
# (`latest`, always the newest published version); anentrypoint-design is
# still a `file:../` sibling link that does not exist in a bare clone, so a
# full `npm install` still cannot complete in CI here. This workflow runs
# every check that IS possible from the repo alone -- JS syntax, YAML config,
# package sanity, and the ASCII-only source convention -- via `npm run lint`,
# which is the same gate humans run locally. There is no automated test
# suite; verification is manual/live against the real running service.

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Lint (syntax + config + package + ascii)
        run: npm run lint
