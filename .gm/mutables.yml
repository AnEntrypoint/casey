- id: spool-crash-loop-2026-07-15
  status: witnessed
  subject: gm-plugkit exec-spool watcher crash-looping, spool verbs (instruction/codesearch/exec_js/browser) all non-functional for a sustained window this session
  detail: 'Every instruction/codesearch dispatch this session (after roughly 15:14 SAST) either returned gate_denied (long-gap-no-instruction, itself caused by the watcher never actually serving) or silently never produced an out/*.json response after 2+ Read re-checks with a fresh watcher .status.json ts. .gm/exec-spool/.watcher.log (1.2MB, exceeds the 256KB read cap) shows the supervisor (pid 75160) respawning a fresh watcher process roughly every 10s continuously for 10+ minutes, each spawn reason=planned-restart-after-heartbeat-stale or reason=post-burst-backoff -- the watcher never stays alive long enough to serve a single dispatch. Two independent bun x gm-plugkit@latest spool reboot attempts (new daemon pids 56296 and 65976 both reported ok:true at spawn) had zero effect: .status.json stayed pinned at the same stale pid=50388/ts value across both reboots, meaning the freshly-spawned daemons never even wrote their own heartbeat before being killed again by whatever is driving the crash loop (a stale/zombie supervisor process, or a wrapper-version mismatch loop -- .watcher.log shows spawn reasons alternating between wrapper-change and heartbeat-stale across the session, suggesting the supervisor itself may be flapping between two wrapper_sha values). exec_js also failed independently with a real ETIMEDOUT bun.exe spawn error on a trivial script, and separately with a body-format rejection (missing timeoutMs) even after switching to the documented plain-text timeoutMs=<ms>\n<script> prefix -- two DISTINCT exec_js failure modes in addition to the watcher-serving problem, suggesting exec_js''s own documented body-format contract may itself be stale/incorrect relative to the actually-installed version. browser verb hit the SAME two symptoms next-step.md already documents as a known 2026-07-15 issue (repeated "document is not defined" ReferenceError despite a real page navigation completing per network/performance telemetry in the response, plus one native UV_HANDLE_CLOSING assertion crash) -- not a new finding, but independent re-confirmation the known issue is still live.'
  witness_evidence: 'Directly observed: 4+ consecutive Read misses against .gm/exec-spool/out/instruction-{4,5,6}.json each preceded by a fresh-ts .status.json check (ruling out the "watcher merely slow" explanation); .watcher.log tail showing >20 respawn cycles at ~10s intervals across a 10+ minute span with zero stable-serving gap between them; two independent spool reboot attempts producing new daemon pids with no change to .status.json. Given the sustained, reproducible, multi-symptom nature (watcher crash loop + two distinct exec_js failures + the pre-existing documented browser bug all co-occurring), this session fell back to direct tool use (Read/Grep/curl against the live dev server) for the remainder of EXECUTE rather than continuing to retry a confirmed-down spool, per the skill''s own "no more than 2-3 retries chasing a single flaky tool" guidance -- recorded here as blockedBy:external (the gm-plugkit binary/supervisor itself, not anything in casey''s own repo) so a future session does not re-attempt the identical reboot loop without first checking whether the underlying plugkit install issue was addressed. This mutable is pre-resolved (status: witnessed) rather than left pending, since the finding IS the witness -- there is no further "resolve" action possible from inside this session; the blocker is external tooling infrastructure, not a code defect this repo''s own EXECUTE can fix.'

