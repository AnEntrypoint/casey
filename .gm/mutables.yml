- id: mut-timestamp-corrupt-masks-urgent
  text: Does case-health.js classifyCaseHealth() return early with ONLY timestamp_corrupt (skipping unanswered_handoff/unsent_draft/etc checks) when lastTouch is non-finite, even if the case also carries needs-human or draft-pending tags that attn.js would otherwise score at +50 to +100?
