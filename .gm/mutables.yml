- id: mut-reload-mechanism
  status: witnessed
  subject: 'Is in-process ESM module-cache busting viable in stock Node>=22 to hot-swap a changed src module WITHOUT losing the cwd-bound thatcher store handle, or must reload be a parent-supervisor + child-worker respawn with the sqlite FILE as the durable boundary? Determines the entire supervisor architecture. Resolve by exec_js witness: attempt a cache-busted dynamic re-import and observe whether the module singleton (and a primed argless handle) is shared or forked.'
  witness: unknown -- pending exec_js
  witness_evidence: 'exec_js-142 (Node v24.15.0): same import specifier shares the module singleton (cached, state persists); a cache-busted specifier ''?v=x'' FORKS the module into a fresh instance with reset state (cachebust_forks_module=true, cachebust_resets_state=true). Therefore in-process ESM cache-busting cannot hot-swap a changed module without forking its module graph -- a cache-busted re-import of thatcher/freddie would fork their primed store/db singletons into a second invisible handle (the exact mem-44264 hazard). RESOLUTION: reload MUST be parent-supervisor + child-worker respawn; the sqlite FILE (reopened by the fresh worker via the same cwd/home) is the durable boundary, not an in-memory handle.'
- id: mut-child-store-sharing
  status: witnessed
  subject: In a parent-supervisor + child-worker model, can two processes (the about-to-die worker draining + the fresh worker booting) safely hold the SAME sqlite app.db open at once during a graceful-drain handoff, or does WAL/locking force the old worker fully down before the new one opens? Determines whether reload is zero-downtime overlap or brief-gap sequential.
  witness: unknown -- pending exec_js against the real thatcher store in a temp cwd
  witness_evidence: 'Resolved by architecture choice, not concurrent-open test: the supervisor uses SEQUENTIAL drain-then-respawn -- the old worker completes graceful drain (in-flight turns finished or marked-for-resume) and fully exits, releasing its sqlite handle, BEFORE the parent forks the new worker which then opens the store. This makes concurrent two-process open of app.db structurally unrepresentable (the exact ''make invalid state unrepresentable'' invariant), so WAL cross-process locking semantics never matter to correctness. Cost: a sub-second gap during reload where no new inbound is processed -- acceptable because (a) inbound during the gap is still delivered by the channel and recorded on next boot, (b) reliability-resume-on-boot re-drives any turn stranded by the gap. Witness: exec_js-142 established respawn = fresh module graph reopening the same file; freddie/src/db.js:6 _db singleton re-primes on fresh worker. Zero-downtime overlap is explicitly NOT pursued (it would require the unresolved concurrent-open question); sequential is the safe-by-construction path.'
