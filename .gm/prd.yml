  witness: 'synthesizeVoice placed AFTER the isFallback/degraded gate (gateway-hooks.js:1202 returns before reply build at :1216), so a blanked/degraded turn never speaks. Guards: CASEY_VOICE_REPLIES!=1 -> null; no key -> null; empty text -> null; truncate(text,600) caps cost; try/catch -> null on any failure; audio is additive (text always sends). node --check + npm run lint green.'
