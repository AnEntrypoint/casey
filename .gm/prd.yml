- id: casey-dashboard-split-auth-gate-regression-fix
  subject: 'FOUND+FIXED critical regression via live boot test: the dashboard route split moved the SPA shell (index.html/app.js/app.css) and PWA routes (icon.svg/manifest.json/sw.js/offline.html) to be registered AFTER the auth gate middleware, with no exemption added for them -- so a completely unauthenticated browser got 401 on the page shell itself, unable to even load the login screen. The ORIGINAL server.js''s app.get(/, ...) handler was always unconditional (confirmed via git history), and the PWA routes were too (a service worker cannot register if fetching its own script needs a session). Added the missing exemptions to the gate middleware in routes/auth.js.'
