- id: event-order-idtiebreak
  title: same-ms event tie-break used lexicographic id sort, inverting insertion order
  body: 'case-store.js byCreatedAsc/byCreatedDesc tie-broke equal created_at by String(a.id).localeCompare -- lexicographic, so id ''10'' sorts before ''9''. Event ids are monotonic autoincrement integers (insertion order), so a same-millisecond inbound+outbound pair could be returned outbound-first. resumePendingTurns walks chronologically and marks completedAfter only for inbounds SEEN before an outbound; with the outbound walked first, a completed turn looks pending and gets a spurious resume-attempted marker (test.js:1444 flake ''a completed turn gets no resume marker''). FIX: byIdAsc compares ids numerically when both parse as finite numbers, else string. WITNESS: 5 consecutive green test.js.'
  status: completed
  witness: 'FIX SUPERSEDED the numeric-id approach in the row body (event ids are NOT numeric -- they are time-prefixed strings with a RANDOM suffix, so any id tiebreak scrambles same-second pairs). Real fix: case-store.js sortByCreatedStable(rows,dir) decorates each row with its input index, sorts by (created_at, index), undecorates -- preserving thatcher''s raw insertion order on same-second ties (witness-rawlist.mjs: raw t.list preserves order 20/20). byCreatedAscList/byCreatedDescList wrap it; both call sites (listEvents:633, listEventsPage:640) updated. Reproducer witness-resume.mjs dropped 4/20 -> 0/20 spurious resume-attempted markers. GATE: 5/5 green test.js runs (b3kc5y451).'
