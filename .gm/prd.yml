- id: llm-reprobe-debounce-no-stampede
  subject: Re-probe must be debounced so a down provider does not add latency to every inbound
  detail: 'A naive ''if callLLM null, re-probe on every inbound'' adds a reachability round-trip (and its timeout) to every message while the provider is down -- turning a fast holding-message reply into a slow one, and stampeding the dead provider. The re-probe must be debounced (e.g. at most once per N seconds) with a cached negative result between attempts, so inbound stays fast and the provider is not hammered. Corner cases: concurrent inbounds during a re-probe (single in-flight probe, shared promise); probe timeout bounded; never block the holding-message reply on the probe (probe async, reply with current backend, upgrade next turn).'
  witness: 'src/llm.js ensure(): single in-flight shared promise (inflight), and an attempt within intervalMs of lastAttempt is skipped (returns current backend without probing). callLLM never blocks the holding reply -- it throws on miss so the handler''s existing try/catch fallback fires. test.js asserts ''within the debounce window the recovered provider is not yet re-probed'' (source stays none until clock advances past intervalMs) -- PASSED.'
