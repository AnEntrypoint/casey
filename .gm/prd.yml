  witness: 'Added ''const esc = escapeHtml'' at true module scope in src/dashboard/server.js right after the escapeHtml import, fixing a real runtime ReferenceError gap that would have fired on the first hit to any server-side route handler calling esc() (report generators, publicFormHtml, and others). Live-witnessed via an isolated eval test reproducing the exact scoping pattern: esc() correctly escapes a script-tag XSS payload when called from a nested function within a createDashboard-shaped closure. node --check passes.'
  status: completed
  commit_comment: 'casey dashboard: fix a live ReferenceError regression (esc() had no module/closure-scope binding after the escapeHtml import refactor) by declaring it at true module scope'
