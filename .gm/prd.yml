- id: tool-refusal-guard-silence-followup
  subject: 'CRITICAL: the structural tool_choice guard (last session) correctly blanks a bad refusal reply but leaves the contact with total silence -- no retry, no recovery, no second attempt at the SAME turn to actually get a real reply'
  notes: 'Live-witnessed via real Discord traffic + curl against the running server: case mrm1kieg-fdvbupbo shows the guard firing correctly ("model ignored forced tool_choice on first turn (no tool call made); blanked") for both "I''m in tweni" attempts, AND a second distinct scrub ("model repeated its own last outbound verbatim; blanked") on the retry. Net effect: person messages twice, gets ZERO replies both times, worse UX than the old wrong-but-present refusal text. AGENTS.md''s own design principle requires SOME recovery path (queue+redrive on LLM-down is the existing pattern for the down-provider case) -- a degraded-due-to-weak-model turn currently has no equivalent: it is blanked once and never retried. Need: either (a) an in-turn retry loop that re-attempts the SAME inbound once more with a stronger nudge/different model selection before giving up, or (b) route a structurally-blanked turn into the SAME queue-and-redrive mechanism drainQueuedTurns already uses for LLM-down, so the next recovery sweep gets another shot at it, or (c) both.'
  status: completed
  witness: 'Two layered fixes, both (a) and (b) from the notes above: (1) src/gateway-hooks.js -- the runTurn dispatch is now wrapped in a bounded retry loop (MAX_TOOL_CHOICE_ATTEMPTS=2): a forced-tool-call turn that comes back with zero tool calls is retried ONCE with a fresh runTurn dispatch (freddie''s own provider fallback chain is availability-ranked per call, not fixed, so a second attempt is a genuinely different roll) before the turn is accepted as degraded; a shared firstTurnHadToolCall(result) helper is used both by the retry loop and the final blanking guard so the two stay consistent. (2) src/casey.js resumePendingTurns -- previously ANY non-throwing handle.call(...) was treated as a PERMANENT success regardless of whether the reply was actually sent; now the return value''s res.degraded is inspected and a resume-degraded:<msgId> marker is appended when the redrive itself came back degraded, so a LATER boot''s sweep still sees that msgId as eligible for another attempt (capped at RESUME_DEGRADED_RETRY_CAP=5 across all future boots, mirroring drainQueuedTurns'' own retryCap-to-dead-letter discipline) instead of abandoning the contact forever after one silent attempt. Verified via synthetic node -e simulation (no test file) matching freddie''s real runTurn message shape across 3 cases: (A) attempt-1 miss + attempt-2 real tool call -> correctly surfaces the attempt-2 real reply text; (B) both attempts miss -> correctly exhausts and blanks; (C) immediate success -> no wasted retry, passes through unchanged. node --check + npm run lint both clean across all edited files. LIMITATION noted honestly: the two specific historical messages that triggered this investigation (msg_id 1526999711469535424 / 1527000273808003102 on case mrm1kieg-fdvbupbo) were already marked resume-attempted under the OLD code before this fix landed, with no resume-degraded marker to retroactively distinguish them from a genuine silent completion -- the new code correctly (by design, not a bug) does not blind-retry those two specific pre-existing entries, since retrying every already-attempted-with-no-signal message would risk an unbounded historical backlog replay; the fix applies fully to all NEW inbound traffic going forward, which is the systemic fix this row asked for.'
- id: gateway-never-connected-false-negative
  subject: GET /api/health reports Discord gateway state:never-connected even though real inbound Discord messages are clearly reaching casey and being recorded/processed (contradiction)
  notes: 'Live-witnessed: curl /api/health on the actually-running worker returned gateway:{ok:false,state:''never-connected'', channels:{discord:{state:''never-connected'',connected:false,sinceInboundMs:134490}}} -- but the SAME case''s event log has real inbound Discord events recorded seconds/minutes earlier (msg_id 1527000273808003102 etc, real Discord message ids). sinceInboundMs:134490 (~2.2min) actually PROVES an inbound WAS received recently, directly contradicting state:never-connected in the same response. Root cause candidates to eliminate: (1) _markConnected(channel) (casey.js) never fires on this worker''s Discord adapter (a READY/RESUMED gateway event is missed or the connectDiscordReceive wrapper''s own connect callback path differs from _makeDiscordAdapter''s expectation), (2) receiveHealth state is somehow tracked per-worker-instance and lost across a hot-reload restart even though inbound STILL flows via a channel the health snapshot does not know about, (3) the health-computation logic in server.js''s receive-liveness block has an inverted or stale condition. This is a real operator-facing false negative -- AGENTS.md explicitly calls this exact signal (deaf receive despite live process) the failure mode receive-liveness tracking exists to catch, and it is currently reporting the WRONG state.'
  status: completed
  witness: 'Root cause CONFIRMED as candidate (1): casey.js wrapped freddie''s DiscordAdapter._dispatch method expecting it to see READY/RESUMED gateway events and call this._markConnected(''discord'') -- but freddie''s DiscordAdapter.start() NEVER opens its own WebSocket at all (confirmed via discord-receive.js''s own header comment: "freddie''s DiscordAdapter.start() only does the gateway lookup and can send(), but never opens the WebSocket"). The REAL gateway connection lives entirely inside casey''s own connectDiscordReceive module (src/discord-receive.js), which has its own independent OP.DISPATCH handler for READY/RESUMED/MESSAGE_CREATE -- a._dispatch is never called by anything in casey''s real receive path, making the wrapped _markConnected call permanently dead code. This ALSO explains a second, independent bug riding the same dead wrapper: botUserId (captured from READY.user.id, used to precisely match the @-mention filter) was never set either, silently degrading the mention filter from "only respond to a mention of THIS bot" to "respond to any @-mention of anyone." Both confirmed via direct code reading (src/casey.js:175-227, src/discord-receive.js real OP.DISPATCH handler) -- not guessed. Fix: connectDiscordReceive now accepts an onConnect(readyPayload) callback, called with the real READY payload on a fresh connect and with null on a RESUME (a resume carries no fresh READY body); casey.js passes a real callback that stamps _markConnected(''discord'') AND captures botUserId from readyPayload.user.id, replacing the dead a._dispatch wrapper entirely. LIVE WITNESSED via curl against the actually-running dev server after a fresh worker boot (which reconnected to the REAL Discord gateway): GET /api/health returned gateway:{ok:true,state:"ok",channels:{discord:{state:"ok",connected:true,sinceConnectMs:167861}}} -- connected:true with a real positive sinceConnectMs, confirming the onConnect callback genuinely fired on a real READY event and the false-negative is resolved. node --check + npm run lint both clean.'
